<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a18">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BURG Honorarium">
  <link rel="manifest" href="/Fee-Calculator-BURG/manifest.json">
  <link rel="apple-touch-icon" href="/Fee-Calculator-BURG/icon-192.png">
  <title>BURG — Honorarium tool</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f4f0;
      color: #1a1a18;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 1.5rem 1rem;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      border: 0.5px solid rgba(0,0,0,0.12);
      padding: 1.5rem;
      width: 100%;
      max-width: 560px;
    }

    h1 { font-size: 18px; font-weight: 500; margin-bottom: 1.25rem; color: #1a1a18; }

    .metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 1.25rem;
    }

    .metric { background: #f5f4f0; border-radius: 8px; padding: 12px 14px; }
    .metric.accent { background: #1a1a18; }
    .metric-label { font-size: 12px; color: #73726c; margin-bottom: 3px; }
    .metric.accent .metric-label { color: #888780; }
    .metric-value { font-size: 19px; font-weight: 500; color: #1a1a18; }
    .metric.accent .metric-value { color: #f5f4f0; font-size: 22px; }

    .controls { display: flex; flex-direction: column; gap: 16px; margin-bottom: 1.25rem; }
    .control-row { display: flex; flex-direction: column; gap: 6px; }
    .control-label { font-size: 12px; color: #73726c; font-weight: 500; }
    .control-input { display: flex; align-items: center; gap: 10px; }

    .text-input-wrap {
      display: flex; align-items: center; gap: 0; flex: 1;
      border: 1px solid rgba(0,0,0,0.15); border-radius: 8px;
      overflow: hidden; background: #fff;
    }
    .input-prefix {
      padding: 10px; font-size: 14px; color: #73726c;
      background: #f5f4f0; border-right: 1px solid rgba(0,0,0,0.1); white-space: nowrap;
    }
    .text-input-wrap input[type="number"] {
      flex: 1; border: none; outline: none; padding: 10px 12px;
      font-size: 16px; font-weight: 500; color: #1a1a18;
      background: transparent; -moz-appearance: textfield; width: 100%;
    }
    .text-input-wrap input[type="number"]::-webkit-outer-spin-button,
    .text-input-wrap input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
    .input-suffix {
      padding: 10px; font-size: 14px; color: #73726c;
      background: #f5f4f0; border-left: 1px solid rgba(0,0,0,0.1); white-space: nowrap;
    }

    input[type="range"] {
      flex: 1; -webkit-appearance: none; height: 4px;
      border-radius: 2px; background: #d3d1c7; outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 22px; height: 22px;
      border-radius: 50%; background: #1a1a18; cursor: pointer;
    }
    input[type="range"]::-moz-range-thumb {
      width: 22px; height: 22px; border-radius: 50%;
      background: #1a1a18; cursor: pointer; border: none;
    }
    .slider-val { font-size: 13px; color: #73726c; min-width: 36px; text-align: right; white-space: nowrap; }

    .btn-group { display: flex; gap: 6px; }
    .btn-group button {
      flex: 1; padding: 9px 4px; font-size: 13px; font-weight: 500;
      border-radius: 8px; border: 1px solid rgba(0,0,0,0.2);
      background: transparent; color: #73726c; cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-group button.active { background: #1a1a18; color: #f5f4f0; border-color: #1a1a18; }

    .toggle-wrap { display: flex; align-items: center; gap: 10px; }
    .toggle { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-track {
      position: absolute; inset: 0; background: #d3d1c7;
      border-radius: 12px; cursor: pointer; transition: background 0.2s;
    }
    .toggle input:checked + .toggle-track { background: #1a1a18; }
    .toggle-thumb {
      position: absolute; top: 3px; left: 3px; width: 18px; height: 18px;
      background: #fff; border-radius: 50%; pointer-events: none; transition: transform 0.2s;
    }
    .toggle input:checked ~ .toggle-thumb { transform: translateX(20px); }
    .toggle-val { font-size: 13px; color: #73726c; }

    .divider { border: none; border-top: 0.5px solid rgba(0,0,0,0.08); margin: 0.25rem 0; }

    .verdict { border-radius: 8px; padding: 12px 16px; font-size: 14px; font-weight: 500; }
    .verdict.go   { background: #eaf3de; color: #3b6d11; }
    .verdict.nogo { background: #fcebeb; color: #a32d2d; }

    .drempel-note { font-size: 12px; color: #888780; margin-top: 1rem; line-height: 1.5; }

    @media (prefers-color-scheme: dark) {
      body { background: #1e1e1c; color: #e0dfd8; }
      .card { background: #2a2a28; border-color: rgba(255,255,255,0.1); }
      h1 { color: #e0dfd8; }
      .metric { background: #333330; }
      .metric.accent { background: #e0dfd8; }
      .metric-label { color: #888780; }
      .metric.accent .metric-label { color: #73726c; }
      .metric-value { color: #e0dfd8; }
      .metric.accent .metric-value { color: #1a1a18; }
      .control-label { color: #888780; }
      .text-input-wrap { border-color: rgba(255,255,255,0.15); background: #333330; }
      .input-prefix { background: #2a2a28; border-color: rgba(255,255,255,0.1); color: #888780; }
      .input-suffix { background: #2a2a28; border-color: rgba(255,255,255,0.1); color: #888780; }
      .text-input-wrap input[type="number"] { color: #e0dfd8; background: #333330; }
      input[type="range"] { background: #444441; }
      input[type="range"]::-webkit-slider-thumb { background: #e0dfd8; }
      input[type="range"]::-moz-range-thumb { background: #e0dfd8; }
      .slider-val { color: #888780; }
      .btn-group button { border-color: rgba(255,255,255,0.25); color: #888780; }
      .btn-group button.active { background: #e0dfd8; color: #1a1a18; border-color: #e0dfd8; }
      .toggle-track { background: #444441; }
      .toggle input:checked + .toggle-track { background: #e0dfd8; }
      .toggle-thumb { background: #2a2a28; }
      .toggle-val { color: #888780; }
      .divider { border-color: rgba(255,255,255,0.08); }
      .verdict.go   { background: #27500a; color: #c0dd97; }
      .verdict.nogo { background: #791f1f; color: #f7c1c1; }
      .drempel-note { color: #5f5e5a; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>BURG — honorarium tool</h1>

    <div class="metrics">
      <div class="metric">
        <div class="metric-label">Bruto jaarsalaris</div>
        <div class="metric-value" id="out-jaar">—</div>
      </div>
      <div class="metric">
        <div class="metric-label">Fee percentage</div>
        <div class="metric-value" id="out-pct">—</div>
      </div>
      <div class="metric accent" style="grid-column: span 2;">
        <div class="metric-label">Honorarium</div>
        <div class="metric-value" id="out-fee">Vul gegevens in</div>
      </div>
    </div>

    <div class="controls">

      <div class="control-row">
        <span class="control-label">Maandsalaris</span>
        <div class="text-input-wrap">
          <span class="input-prefix">€</span>
          <input type="number" id="inp-salaris" placeholder="bijv. 5250" min="0" step="50" oninput="calc()">
          <span class="input-suffix">/ mnd</span>
        </div>
      </div>

      <div class="control-row">
        <span class="control-label">Periodes</span>
        <div class="btn-group" id="periode-group">
          <button onclick="setPeriode(12, this)" class="active">12</button>
          <button onclick="setPeriode(13, this)">13</button>
          <button onclick="setPeriode(14, this)">14</button>
        </div>
      </div>

      <div class="control-row">
        <span class="control-label">Vakantiegeld</span>
        <div class="control-input">
          <input type="range" min="0" max="8" step="1" value="8" id="sl-vak" oninput="calc()">
          <span class="slider-val" id="lbl-vak">8%</span>
        </div>
      </div>

      <div class="control-row">
        <span class="control-label">Leaseauto</span>
        <div class="toggle-wrap">
          <label class="toggle">
            <input type="checkbox" id="tog-lease" onchange="calc()">
            <div class="toggle-track"></div>
            <div class="toggle-thumb"></div>
          </label>
          <span class="toggle-val" id="lbl-lease">Nee &mdash; &euro;&nbsp;0</span>
        </div>
      </div>

      <div class="control-row">
        <span class="control-label">Bonus</span>
        <div class="control-input">
          <input type="range" min="0" max="10" step="1" value="0" id="sl-bonus" oninput="calc()">
          <span class="slider-val" id="lbl-bonus">0%</span>
        </div>
      </div>

      <hr class="divider">

      <div class="control-row">
        <span class="control-label">Fee percentage</span>
        <div class="text-input-wrap">
          <input type="number" id="inp-fee" placeholder="bijv. 23" min="0" max="100" step="0.5" oninput="calc()" style="text-align: center;">
          <span class="input-suffix">%</span>
        </div>
      </div>

    </div>

    <div class="verdict nogo" id="verdict">
      Vul maandsalaris en fee percentage in
    </div>

    <p class="drempel-note">Minimumdrempel: &euro;&nbsp;13.500 &middot; Bonus exclusief vakantiegeld &middot; Leaseauto +&euro;&nbsp;6.000</p>
  </div>

  <script>
    let periodes = 12;

    function setPeriode(n, el) {
      periodes = n;
      document.querySelectorAll('#periode-group button').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      calc();
    }

    function fmt(n) {
      return '\u20ac\u00a0' + Math.round(n).toLocaleString('nl-NL');
    }

    function calc() {
      const maand    = parseFloat(document.getElementById('inp-salaris').value) || 0;
      const feePct   = parseFloat(document.getElementById('inp-fee').value) || 0;
      const vak      = +document.getElementById('sl-vak').value / 100;
      const lease    = document.getElementById('tog-lease').checked ? 6000 : 0;
      const bonusPct = +document.getElementById('sl-bonus').value / 100;

      document.getElementById('lbl-vak').textContent   = (vak * 100).toFixed(0) + '%';
      document.getElementById('lbl-lease').textContent = lease > 0 ? 'Ja \u2014 \u20ac\u00a06.000' : 'Nee \u2014 \u20ac\u00a00';
      document.getElementById('lbl-bonus').textContent = (bonusPct * 100).toFixed(0) + '%';

      if (maand <= 0 || feePct <= 0) {
        document.getElementById('out-jaar').textContent = '\u2014';
        document.getElementById('out-pct').textContent  = '\u2014';
        document.getElementById('out-fee').textContent  = 'Vul gegevens in';
        const v = document.getElementById('verdict');
        v.className = 'verdict nogo';
        v.textContent = 'Vul maandsalaris en fee percentage in';
        return;
      }

      const basJaar  = maand * periodes * (1 + vak);
      const bonusAbs = maand * periodes * bonusPct;
      const jaar     = basJaar + bonusAbs + lease;
      const fee      = jaar * (feePct / 100);

      document.getElementById('out-jaar').textContent = fmt(jaar);
      document.getElementById('out-pct').textContent  = feePct.toFixed(1).replace('.', ',') + '%';
      document.getElementById('out-fee').textContent  = fmt(fee);

      const v = document.getElementById('verdict');
      v.className = 'verdict';
      if (fee >= 13500) {
        v.classList.add('go');
        v.textContent = 'Go \u2014 honorarium boven minimumdrempel van \u20ac\u00a013.500';
      } else {
        v.classList.add('nogo');
        v.textContent = 'No-go \u2014 honorarium komt niet boven \u20ac\u00a013.500';
      }
    }

    calc();
  </script>
</body>
</html>
