<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a18">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BURG Tools">
  <link rel="manifest" href="/Fee-Calculator-BURG/manifest.json">
  <link rel="apple-touch-icon" href="/Fee-Calculator-BURG/icon-192.png">
  <title>BURG — Tools</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f4f0;
      color: #1a1a18;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .logo {
      width: 64px;
      height: 64px;
      background: #4169a0;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 1.25rem;
      letter-spacing: -1px;
    }

    h1 {
      font-size: 22px;
      font-weight: 500;
      color: #1a1a18;
      margin-bottom: 0.375rem;
      text-align: center;
    }

    .subtitle {
      font-size: 14px;
      color: #73726c;
      margin-bottom: 2.5rem;
      text-align: center;
    }

    .tools {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 400px;
    }

    .tool-card {
      background: #ffffff;
      border-radius: 16px;
      border: 0.5px solid rgba(0,0,0,0.12);
      padding: 1.25rem 1.5rem;
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: border-color 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .tool-card:active { transform: scale(0.98); }

    .tool-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .tool-icon.blue { background: #e6f1fb; }
    .tool-icon.dark { background: #1a1a18; }

    .tool-text { flex: 1; }

    .tool-name {
      font-size: 15px;
      font-weight: 500;
      color: #1a1a18;
      margin-bottom: 2px;
    }

    .tool-desc {
      font-size: 13px;
      color: #73726c;
      line-height: 1.4;
    }

    .tool-arrow {
      font-size: 18px;
      color: #b4b2a9;
      flex-shrink: 0;
    }

    .version {
      font-size: 11px;
      color: #b4b2a9;
      margin-top: 2rem;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #1e1e1c; color: #e0dfd8; }
      h1 { color: #e0dfd8; }
      .subtitle { color: #5f5e5a; }
      .tool-card { background: #2a2a28; border-color: rgba(255,255,255,0.1); }
      .tool-name { color: #e0dfd8; }
      .tool-desc { color: #5f5e5a; }
      .tool-icon.blue { background: #0c447c; }
      .tool-icon.dark { background: #e0dfd8; }
      .tool-arrow { color: #444441; }
      .version { color: #444441; }
    }
  </style>
</head>
<body>

  <div class="logo">€</div>
  <h1>BURG QHSSE</h1>
  <p class="subtitle">Kies een tool</p>

  <div class="tools">

    <a href="/Fee-Calculator-BURG/index.html" class="tool-card">
      <div class="tool-icon blue">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 7H15M9 12H15M9 17H12M5 3H19C19.5523 3 20 3.44772 20 4V20C20 20.5523 19.5523 21 19 21H5C4.44772 21 4 20.5523 4 20V4C4 3.44772 4.44772 3 5 3Z" stroke="#185fa5" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="tool-text">
        <div class="tool-name">Fee calculator</div>
        <div class="tool-desc">Schat de fee in vóór een gesprek</div>
      </div>
      <span class="tool-arrow">›</span>
    </a>

    <a href="/Fee-Calculator-BURG/plaatsing.html" class="tool-card">
      <div class="tool-icon dark">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C8.13 2 5 5.13 5 9C5 14.25 12 22 12 22C12 22 19 14.25 19 9C19 5.13 15.87 2 12 2ZM12 11.5C10.62 11.5 9.5 10.38 9.5 9C9.5 7.62 10.62 6.5 12 6.5C13.38 6.5 14.5 7.62 14.5 9C14.5 10.38 13.38 11.5 12 11.5Z" fill="#f5f4f0"/>
        </svg>
      </div>
      <div class="tool-text">
        <div class="tool-name">Honorarium tool</div>
        <div class="tool-desc">Bereken het honorarium bij plaatsing</div>
      </div>
      <span class="tool-arrow">›</span>
    </a>

  </div>

  <p class="version">BURG QHSSE &middot; 2026</p>

</body>
</html>
